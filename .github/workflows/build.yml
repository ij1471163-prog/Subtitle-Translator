name: Build SubtitleTranslator

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'وش تبي تبني؟'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # ─── APK (للاستخدام الشخصي أو الاختبار) ───────────────────
      - name: Build Signed APK
        if: ${{ inputs.build_target == 'apk' || inputs.build_target == 'both' }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASS }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon --build-cache --parallel

      - name: Upload APK
        if: ${{ inputs.build_target == 'apk' || inputs.build_target == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: SubtitleTranslator-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      # ─── AAB (للرفع على Google Play) ────────────────────────────
      - name: Build Signed AAB
        if: ${{ inputs.build_target == 'aab' || inputs.build_target == 'both' }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASS }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon --build-cache --parallel

      - name: Upload AAB
        if: ${{ inputs.build_target == 'aab' || inputs.build_target == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: SubtitleTranslator-aab-${{ github.run_number }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 14
