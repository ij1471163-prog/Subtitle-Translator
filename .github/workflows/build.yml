name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'وش تبني؟'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Build Debug
        if: ${{ inputs.build_target == 'debug' }}
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Release
        if: ${{ inputs.build_target == 'release' }}
        run: ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: APK-${{ inputs.build_target }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 7
